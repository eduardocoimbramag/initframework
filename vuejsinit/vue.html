<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minha aplicação Vue.js</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
</head>

<body>
    <div id="app">
        {{message}}
    </div>
    <script>
        //Criar uma instancia VueJS
        new Vue({
            el: '#app', //montar a instância de um elemento VueJS com id 'app'
            data: {
                message: 'Olá, VueJS!'
            }
        });
    </script>
</body>

</html>
